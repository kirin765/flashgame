<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>플래시 게임</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="플래시 게임을Browser에서 바로 플레이" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="canonical" href="https://flashgame.example.com/game.html" />
  <meta name="swf-base-url" content="/swf/" />

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 16px;
      background: #0f172a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    header a:hover {
      color: #22c55e;
      background: #1e293b;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      flex: 1;
      color: #f8fafc;
      font-weight: 600;
    }
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
      width: 100%;
      flex: 1;
    }
    .game-header {
      margin-bottom: 16px;
    }
    .game-title {
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
      margin: 0 0 8px;
    }
    .meta {
      font-size: 14px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .meta .category {
      background: #1e293b;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: #22c55e;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .tag {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #334155;
      color: #94a3b8;
      background: #1e293b;
    }
    .game-frame-wrap {
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #1e293b;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .game-frame-inner {
      width: 100%;
      height: 520px;
      background: #000;
    }
    @media (max-width: 640px) {
      .game-frame-inner {
        height: 300px;
      }
      .game-title {
        font-size: 20px;
      }
    }
    .desc {
      margin-top: 20px;
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.6;
      padding: 16px;
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #1e293b;
      color: #22c55e;
    }
    footer {
      padding: 20px;
      text-align: center;
      border-top: 1px solid #1e293b;
      background: #0f172a;
      color: #64748b;
      font-size: 13px;
    }
    footer a {
      color: #22c55e;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
    .swf-status {
      display: none;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #94a3b8;
      text-align: center;
      padding: 18px;
      white-space: pre-line;
      line-height: 1.6;
      font-size: 14px;
      background: #0f172a;
    }
    .swf-status[data-state="idle"] {
      display: flex;
    }
    .swf-status a {
      color: #22c55e;
      text-decoration: none;
    }
    .swf-status a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">
      <span>←</span> 목록으로
    </a>
    <h1 id="gameTitle">플래시 게임</h1>
  </header>

  <main>
    <div class="game-header">
      <h2 id="gameTitleDisplay" class="game-title"></h2>
      <div class="meta">
        <span class="category" id="gameCategory"></span>
        <span id="gameId"></span>
      </div>
      <div class="tags" id="tagList"></div>
    </div>

    <div class="game-frame-wrap">
      <div id="gamePlayer" class="game-frame-inner">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;">
          게임 로딩 중...
        </div>
      </div>
    </div>

    <div class="desc" id="gameDesc"></div>
    
    <div style="margin-top: 20px;">
      <a href="index.html" class="back-btn">← 게임 목록으로 돌아가기</a>
    </div>
  </main>

  <footer>
    <p>© 2026 플래시 게임 모음 | <a href="index.html">홈으로</a></p>
  </footer>

  <script>
    const BASE_TAGS = [
      "플래시게임", "플래시", "flash game", "ruffle",
      "고전게임", "추억의게임", "옛날게임",
      "웹게임", "무료게임", "온라인게임"
    ];
    const SWF_DEFAULT_BASE_URL = '/swf/';
    const SWF_QUERY_KEY = 'swfBase';
    const SWF_CONFIG_KEY = '__SWF_BASE_URL__';

    function normalizeSwfBaseUrl(value) {
      if (!value || typeof value !== 'string') return SWF_DEFAULT_BASE_URL;
      const trimmed = value.trim();
      if (!trimmed) return SWF_DEFAULT_BASE_URL;
      return trimmed.endsWith('/') ? trimmed : `${trimmed}/`;
    }

    function getSwfBaseUrl() {
      const params = new URLSearchParams(window.location.search);
      const queryValue = params.get(SWF_QUERY_KEY);
      const globalValue = window[SWF_CONFIG_KEY];
      const metaEl = document.querySelector('meta[name="swf-base-url"]');
      const metaValue = metaEl && metaEl.content;

      const rawBase = queryValue || globalValue || metaValue || SWF_DEFAULT_BASE_URL;
      return normalizeSwfBaseUrl(rawBase);
    }

    function buildSwfUrl(filename) {
      const baseUrl = getSwfBaseUrl();
      try {
        return new URL(encodeURIComponent(filename), baseUrl).toString();
      } catch (e) {
        return `${baseUrl}${encodeURIComponent(filename)}`;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function showSwfError(swfUrl) {
      const player = document.getElementById('gamePlayer');
      const fallbackBase = getSwfBaseUrl();
      player.innerHTML = `
        <div class="swf-status" data-state="idle">
          SWF 로드 실패 또는 경로 문제입니다.\n\n
          경로: ${escapeHtml(swfUrl)}\n
          - 파일명 또는 SWF 경로(`/swf/<filename>`)가 정확한지 확인하세요.\n
          - 운영 배포시엔 meta[name="swf-base-url"] 또는 query(?swfBase=) 값을 외부 스토리지 주소로 지정하세요.\n
          - 현재 base: ${escapeHtml(fallbackBase)}\n
          - 또는 관리자에게 swfBase URL을 재설정 요청해주세요.
        </div>
      `;
    }

    function getSlugFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('slug');
    }

    async function loadGame() {
      const slug = getSlugFromUrl();
      const titleEl = document.getElementById('gameTitle');
      const titleDisplay = document.getElementById('gameTitleDisplay');

      if (!slug) {
        titleEl.textContent = '잘못된 접근';
        titleDisplay.textContent = '잘못된 접근입니다.';
        return;
      }

      try {
        const res = await fetch('games.json');
        const games = await res.json();
        const game = games.find(g => g.slug === slug);

        if (!game) {
          titleEl.textContent = '게임 없음';
          titleDisplay.textContent = '게임을 찾을 수 없습니다.';
          return;
        }

        document.title = `${game.title} - 플래시 게임`;
        titleEl.textContent = game.title;
        titleDisplay.textContent = game.title;
        
        // Category
        const categoryEl = document.getElementById('gameCategory');
        categoryEl.textContent = game.category || '플래시게임';
        
        // ID
        document.getElementById('gameId').textContent = `ID: ${game.id}`;

        // Description
        const descEl = document.getElementById('gameDesc');
        if (game.description && game.description.trim()) {
          descEl.textContent = game.description;
        } else {
          descEl.textContent = '플래시 기반 고전 웹게임입니다. 바로 플레이해보세요!';
        }

        // Tags
        const tagList = document.getElementById('tagList');
        [...BASE_TAGS, game.title].slice(0, 6).forEach(t => {
          const span = document.createElement('span');
          span.className = 'tag';
          span.textContent = t;
          tagList.appendChild(span);
        });

        // SWF player
        const swfPath = buildSwfUrl(game.filename);
        const player = document.getElementById('gamePlayer');
        const safeSwfPath = escapeHtml(swfPath);
        const statusId = `swf-status-${Date.now()}`;

        player.innerHTML = `
          <div id="${statusId}" class="swf-status" data-state="idle">게임을 로드하는 중입니다...</div>
        `;
        const statusNode = document.getElementById(statusId);

        const object = document.createElement('object');
        object.type = 'application/x-shockwave-flash';
        object.setAttribute('data', swfPath);
        object.setAttribute('width', '100%');
        object.setAttribute('height', '100%');

        const movie = document.createElement('param');
        movie.setAttribute('name', 'movie');
        movie.setAttribute('value', swfPath);
        const allowScriptAccess = document.createElement('param');
        allowScriptAccess.setAttribute('name', 'allowScriptAccess');
        allowScriptAccess.setAttribute('value', 'sameDomain');
        const allowFullScreen = document.createElement('param');
        allowFullScreen.setAttribute('name', 'allowFullScreen');
        allowFullScreen.setAttribute('value', 'true');

        const embed = document.createElement('embed');
        embed.src = swfPath;
        embed.setAttribute('width', '100%');
        embed.setAttribute('height', '100%');
        embed.setAttribute('allowScriptAccess', 'sameDomain');
        embed.setAttribute('allowFullScreen', 'true');

        object.appendChild(movie);
        object.appendChild(allowScriptAccess);
        object.appendChild(allowFullScreen);
        object.appendChild(embed);

        const onSwfError = () => {
          statusNode.style.display = 'none';
          showSwfError(swfPath);
        };
        const onSwfLoad = () => {
          statusNode.style.display = 'none';
        };

        object.addEventListener('error', onSwfError, { once: true });
        object.addEventListener('load', onSwfLoad, { once: true });
        embed.addEventListener('error', onSwfError, { once: true });
        embed.addEventListener('load', onSwfLoad, { once: true });
        object.onerror = onSwfError;

        player.appendChild(object);
      } catch (e) {
        console.error(e);
        titleEl.textContent = '오류';
        titleDisplay.textContent = '오류가 발생했습니다.';
      }
    }

    loadGame();
  </script>

  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</body>
</html>
