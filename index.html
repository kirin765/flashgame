<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>플래시 게임</title>

  <!-- Ruffle 공식 CDN 사용 (별도 ruffle.js 업로드 안 해도 됨) -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <!-- Ruffle이 자동으로 감지해서 실행할 embed 태그 -->
  <script>
  // URL 파라미터 swfsrc 가져오기
  const urlParams = new URLSearchParams(window.location.search);
  const swfFile = urlParams.get("swfsrc");

  if (!swfFile) {
    document.body.innerHTML = "<p style='color:white'>swfsrc 파라미터가 필요합니다.</p>";
  } else {
    // embed 태그 생성
    const embed = document.createElement("embed");
    embed.src = swfFile;      // 여기서 swf 주소 주입
    embed.width = "800";
    embed.height = "600";

    document.body.appendChild(embed);
  }
</script>
</body>
</html>
